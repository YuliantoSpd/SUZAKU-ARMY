<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Log in Page</title>
    <link rel="stylesheet" href="stylelogin.css" />
    <link rel="stylesheet" href="../css/stylenav.css" />
    <link rel="stylesheet" href="../css/stylefont.css" />
    <link rel="stylesheet" href="../css/stylebgm.css" />
    <script src="../js/scriptnav.js"></script>
    <script src="scriptform.js" defer></script>
    <script src="../js/scriptbgm.js" defer></script>
    <link
      href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css"
      rel="stylesheet"
    />
    <link
      href="https://cdn.boxicons.com/3.0.8/fonts/basic/boxicons.min.css"
      rel="stylesheet"
    />
    <link
      href="https://cdn.boxicons.com/3.0.8/fonts/filled/boxicons-filled.min.css"
      rel="stylesheet"
    />
    <link
      href="https://cdn.boxicons.com/3.0.8/fonts/brands/boxicons-brands.min.css"
      rel="stylesheet"
    />
  </head>
  <body>
    <header>
      <div class="logo-area">
        <div class="music-container">
          <button onclick="toggleMusic()" class="music-btn">🎵</button>

          <input
            type="range"
            id="volume-control"
            min="0"
            max="1"
            step="0.01"
            value="0.5"
          />
        </div>
        <h2 class="logo">SUZAKU ARMY</h2>
      </div>
      <audio id="bg-music" loop>
        <source src="../Music/Elden Ring Main Theme.mp3" type="audio/mpeg" />
      </audio>
      <div class="hamburger" onclick="toggleMenu()">
        <span></span>
        <span></span>
        <span></span>
      </div>
      <nav class="navigation">
        <a href="">PROFIL</a>
        <a href="">HOME</a>
        <a href="">ABOUT</a>
        <a href="">SERVICE</a>
        <button class="btnLogin-popup">LOGIN</button>
      </nav>
    </header>
    <div class="container">
      <div class="form-box login">
        <form action="">
          <h1>LOGIN</h1>
          <div class="input-box">
            <input type="text" placeholder="Username" required />
            <i class="bx bx-user" style="color: #000000"></i>
          </div>
          <div class="input-box">
            <input type="password" placeholder="Password" required />
            <i class="bx bx-lock" style="color: #000000"></i>
          </div>
          <div class="forgot-link">
            <a href="">Forgot password</a>
          </div>
          <button type="submit" class="btn">LOGIN</button>
          <p>or login with</p>
          <div class="social-icons">
            <a href=""><i class="bx bxl-google"></i></a>
            <a href=""><i class="bx bxl-github"></i></a>
          </div>
        </form>
      </div>

      <div class="form-box register">
        <form action="">
          <h1>Registration</h1>
          <div class="input-box">
            <input type="text" placeholder="Username" required />
            <i class="bx bx-user" style="color: #000000"></i>
          </div>
          <div class="input-box">
            <input type="email" placeholder="Email" required />
            <i class="bx bx-envelope-alt" style="color: #000000"></i>
          </div>
          <div class="input-box">
            <input type="password" placeholder="Password" required />
            <i class="bx bx-lock" style="color: #000000"></i>
          </div>
          <button type="submit" class="btn">REGISTER</button>
          <p>or register with</p>
          <div class="social-icons">
            <a href=""><i class="bx bxl-google"></i></a>
            <a href=""><i class="bx bxl-github"></i></a>
          </div>
        </form>
      </div>
      <div class="toggle-box">
        <div class="toggle-panel toggle-left">
          <h1>Welcome</h1>
          <p>Register down here</p>
          <button class="btn register-btn">REGISTER</button>
        </div>
        <div class="toggle-panel toggle-right">
          <h1>Welcome Back</h1>
          <p>Have account?</p>
          <button class="btn login-btn">LOGIN</button>
        </div>
      </div>
    </div>
  </body>
</html>
