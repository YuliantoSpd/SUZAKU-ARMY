<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <link rel="stylesheet" href="stylehome.css" />

  <body>

        <div class="music-container">

          <input
            type="range"
            id="volume-control"
            min="0"
            max="1"
            step="0.01"
            value="0.5"

        <h2 class="logo">SUZAKU ARMY</h2>
      </div>
      <audio id="bg-music" loop>
        <source src="Music/Elden Ring Main Theme.mp3" type="audio/mpeg" />
      </audio>
      <div class="hamburger" onclick="toggleMenu()">
        <span></span>
        <span></span>
        <span></span>
      </div>
      <nav class="navigation">
        <a href="">PROFIL</a>
        <a href="">HOME</a>
        <a href="">ABOUT</a>
        <a href="">SERVICE</a>
        <button class="btnLogin-popup" onclick="window.location.href='Login/index-login.html'">SIGN UP</button>
      </nav>
    </header>
</body>
